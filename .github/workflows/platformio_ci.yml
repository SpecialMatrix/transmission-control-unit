name: PlatformIO CI

on: [push]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-cache-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-cache-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install platformio gcovr coveralls

      - name: Run tests
        run: pio test -v -e native

      - name: Generate Coverage Report
        run: |
          mkdir "coverage"
          gcovr -r . --json-pretty -o coverage.json --exclude ".pio" --exclude "test" --exclude "lib/dbc"

      - name: Upload Coverage to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: |
          coveralls --json-file coverage.json